<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vercel-feed — history</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d14; color: #ccc; font-family: monospace; font-size: 13px; }

  header {
    display: flex; align-items: center; gap: 16px;
    padding: 12px 20px; border-bottom: 1px solid #1e1e2e;
    position: sticky; top: 0; background: #0d0d14; z-index: 10;
  }
  header a { color: #6c63ff; text-decoration: none; font-size: 12px; }
  header a:hover { text-decoration: underline; }
  #search {
    margin-left: auto; background: #1a1a2e; border: 1px solid #2a2a3e;
    color: #ccc; padding: 5px 10px; border-radius: 20px; font-family: monospace;
    font-size: 12px; width: 240px; outline: none;
  }
  #search:focus { border-color: #6c63ff; }
  #count { color: #555; font-size: 12px; white-space: nowrap; }

  #list { padding: 0; }

  .row {
    display: flex; align-items: center; gap: 12px;
    padding: 9px 20px; border-bottom: 1px solid #111;
    position: relative; cursor: default;
  }
  .row:hover { background: #12121e; }

  .ts { color: #444; min-width: 130px; font-size: 11px; }

  .hostname {
    color: #a0a0cc; flex: 1; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }
  .hostname a { color: inherit; text-decoration: none; }
  .hostname a:hover { color: #6c63ff; text-decoration: underline; }

  .title { color: #555; flex: 1.5; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 11px; }

  .badge {
    font-size: 10px; padding: 2px 7px; border-radius: 10px;
    font-weight: bold; min-width: 56px; text-align: center;
  }
  .badge-clean      { background: #1a3a1a; color: #4caf50; }
  .badge-suspicious { background: #3a2a00; color: #ff9800; }
  .badge-flagged    { background: #3a1a1a; color: #f44336; }
  .badge-404        { background: #1e1e1e; color: #555; }
  .badge-scanning   { background: #1a1a3a; color: #6c63ff; }

  /* Hover preview */
  .preview {
    display: none; position: fixed; z-index: 100;
    width: 320px; background: #1a1a2e; border: 1px solid #2a2a3e;
    border-radius: 8px; overflow: hidden; box-shadow: 0 8px 32px #000a;
    pointer-events: none;
  }
  .preview img { width: 100%; height: 180px; object-fit: cover; display: block; background: #111; }
  .preview-label {
    padding: 8px 12px; font-size: 11px; color: #888;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  #empty { padding: 60px 20px; text-align: center; color: #333; }
</style>
</head>
<body>

<header>
  <a href="/">← Live feed</a>
  <span id="count"></span>
  <input id="search" type="text" placeholder="Search hostnames..." autocomplete="off">
</header>

<div id="list"></div>
<div id="empty" style="display:none">No history yet — entries appear here once processed.</div>

<div class="preview" id="preview">
  <img id="preview-img" src="" alt="">
  <div class="preview-label" id="preview-label"></div>
</div>

<script>
const list = document.getElementById('list');
const empty = document.getElementById('empty');
const countEl = document.getElementById('count');
const searchEl = document.getElementById('search');
const preview = document.getElementById('preview');
const previewImg = document.getElementById('preview-img');
const previewLabel = document.getElementById('preview-label');

let allRows = [];

const BADGE_CLASS = {
  clean: 'badge-clean',
  suspicious: 'badge-suspicious',
  flagged: 'badge-flagged',
  '404': 'badge-404',
  scanning: 'badge-scanning',
};

function formatTs(ts) {
  const d = new Date(ts);
  return d.toLocaleString('en-AU', {
    month: 'short', day: 'numeric',
    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
  });
}

function screenshotUrl(entry) {
  if (entry.urlscanId) return `https://urlscan.io/screenshots/${entry.urlscanId}.png`;
  return `https://api.microlink.io/?url=${encodeURIComponent(entry.url)}&screenshot=true&embed=screenshot.url`;
}

function buildRow(entry) {
  const row = document.createElement('div');
  row.className = 'row';
  row.dataset.hostname = entry.hostname;
  row.dataset.title = (entry.title || '').toLowerCase();

  const ts = document.createElement('span');
  ts.className = 'ts';
  ts.textContent = formatTs(entry.timestamp);

  const hn = document.createElement('span');
  hn.className = 'hostname';
  const a = document.createElement('a');
  a.href = entry.url;
  a.target = '_blank';
  a.rel = 'noopener noreferrer';
  a.textContent = entry.hostname;
  hn.appendChild(a);

  const title = document.createElement('span');
  title.className = 'title';
  title.textContent = entry.title || '';

  const badge = document.createElement('span');
  badge.className = 'badge ' + (BADGE_CLASS[entry.status] || 'badge-404');
  badge.textContent = entry.status;

  row.appendChild(ts);
  row.appendChild(hn);
  row.appendChild(title);
  row.appendChild(badge);

  row.addEventListener('mouseenter', (e) => {
    previewImg.src = screenshotUrl(entry);
    previewLabel.textContent = entry.hostname;
    positionPreview(e);
    preview.style.display = 'block';
  });
  row.addEventListener('mousemove', positionPreview);
  row.addEventListener('mouseleave', () => { preview.style.display = 'none'; });

  return row;
}

function positionPreview(e) {
  const pad = 16, pw = 320, ph = 220;
  let x = e.clientX + pad;
  let y = e.clientY + pad;
  if (x + pw > window.innerWidth)  x = e.clientX - pw - pad;
  if (y + ph > window.innerHeight) y = e.clientY - ph - pad;
  preview.style.left = x + 'px';
  preview.style.top  = y + 'px';
}

function applySearch(query) {
  const q = query.toLowerCase();
  let visible = 0;
  for (const row of allRows) {
    const match = !q || row.dataset.hostname.includes(q) || row.dataset.title.includes(q);
    row.style.display = match ? '' : 'none';
    if (match) visible++;
  }
  countEl.textContent = `${visible.toLocaleString()} entries`;
}

searchEl.addEventListener('input', () => applySearch(searchEl.value));

fetch('/api/history')
  .then(r => r.json())
  .then(entries => {
    if (!entries.length) { empty.style.display = ''; return; }
    const frag = document.createDocumentFragment();
    for (const entry of entries) {
      const row = buildRow(entry);
      allRows.push(row);
      frag.appendChild(row);
    }
    list.appendChild(frag);
    countEl.textContent = `${entries.length.toLocaleString()} entries`;
  })
  .catch(() => { empty.style.display = ''; });
</script>
</body>
</html>
